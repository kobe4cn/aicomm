name: build

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  RUST_DIRS: chat chatapp/src-tauri

jobs:
  build-rust:
    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres
        # Provide the password for postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: chat
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install Rust
        run: rustup toolchain install stable --component llvm-tools-preview
      - name: Install system dependencies for Tauri
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.0-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            curl
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: install nextest
        uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      - name: Check code format
        run: |
          for dir in $RUST_DIRS; do
            echo "Formatting code in $dir directory..."
            cd $dir && cargo fmt --all -- --check
            cd ..
          done
      - name: Check the package for errors
        run: |
          for dir in $RUST_DIRS; do
            echo "Formatting code in $dir directory..."
            cd $dir && cargo check --all
            cd ..
          done
      - name: Lint rust sources
        run: |
          for dir in $RUST_DIRS; do
            cd $dir && cargo clippy --all-targets --all-features --tests --benches -- -D warnings
            cd ..
          done
      - name: Execute rust tests
        run: |
          for dir in $RUST_DIRS; do
            cd $dir && cargo nextest run --all-features
            cd ..
          done
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v2
        id: git-cliff
        if: startsWith(github.ref, 'refs/tags/')
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: ${{ steps.git-cliff.outputs.content }}
